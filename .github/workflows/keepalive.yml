name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 12:00 UTC
  workflow_dispatch:  # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://lkwcolbaaetgwlfabvw.supabase.co/rest/v1/)
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" == "000" ]; then
            echo "WARNING: No response from Supabase!"
            exit 1
          fi
          echo "Ping successful!"